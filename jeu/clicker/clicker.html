<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Clicker</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ===== Base ===== */
body {
  font-family: 'Orbitron', sans-serif;
  margin: 0;
  min-height: 100vh;
  overflow: hidden;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  background:
    radial-gradient(circle at top, rgba(140, 0, 255, 0.15), transparent 40%),
    radial-gradient(circle at bottom, rgba(0, 200, 255, 0.12), transparent 40%),
    linear-gradient(135deg, #050510, #090916 40%, #020205);

  color: #d8f6ff;
  position: relative;
}

/* ===== Grille futuriste ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;

  background-image:
    linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);

  background-size: 40px 40px;

  mask-image: radial-gradient(circle at center, black 30%, transparent 90%);
  pointer-events: none;

  animation: gridMove 12s linear infinite;
}

@keyframes gridMove {
  from {
    transform: translateY(0px);
  }
  to {
    transform: translateY(40px);
  }
}

/* ===== Glow ambiance ===== */
body::after {
  content: "";
  position: fixed;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(0,255,255,0.08), transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  filter: blur(50px);
  pointer-events: none;
}
      h1 {
        font-weight: 900;
        font-size: 4rem;
        letter-spacing: 0.15em;
        color: #00f0ff;
        text-transform: uppercase;
        text-shadow:
          0 0 5px #00f0ff,
          0 0 10px #00f0ff,
          0 0 20px #00e0ff,
          0 0 30px #00d0ff,
          0 0 40px #00c0ff;
        margin-bottom: 20px;
        z-index: 1;
      }

      #clicks {
        font-size: 2rem;
        font-weight: 700;
        color: #ffffff;
        text-shadow:
          0 0 5px #00f0ff,
          0 0 10px #00f0ff,
          0 0 20px #00e0ff;
        margin-bottom: 30px;
        z-index: 1;
      }

      #clicker-img {
        width: 300px;
        height: 300px;
        cursor: pointer;
        border-radius: 50%;
        box-shadow:
          0 0 20px #00f0ff,
          0 0 40px #00f0ff,
          0 0 60px #00e0ff;
        transition:
          transform 0.1s ease,
          box-shadow 0.1s ease;
        z-index: 1;
        user-select: none;
      }

      #clicker-img:hover {
        transform: scale(1.05);
        box-shadow:
          0 0 30px #00ffff,
          0 0 60px #00ffff,
          0 0 90px #00ffff;
      }

      #clicker-img:active {
        transform: scale(0.95);
        box-shadow:
          0 0 10px #00c0ff,
          0 0 20px #00c0ff,
          0 0 30px #00c0ff;
      }

      .buttons {
        display: flex;
        gap: 20px;
        margin-top: 30px;
        z-index: 1;
      }

      button {
        padding: 12px 30px;
        font-size: 18px;
        font-weight: 700;
        color: #00f0ff;
        background: linear-gradient(145deg, #0a2a5f, #003080);
        border: 2px solid #00f0ff;
        border-radius: 12px;
        cursor: pointer;
        box-shadow:
          0 0 6px #00bfff,
          inset 0 0 8px #0077cc;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        user-select: none;
      }

      button:hover {
        color: #ffffff;
        background: linear-gradient(145deg, #005eff, #00ffff);
        box-shadow:
          0 0 12px #00ffff,
          0 0 30px #00ffff,
          inset 0 0 20px #00ffff;
        transform: translateY(-3px);
      }

      button:active {
        transform: translateY(1px);
        box-shadow:
          0 0 6px #00c6ff,
          inset 0 0 10px #00c6ff;
      }
    </style>
  </head>
  <body>
    <h1>Clicker</h1>
    <div id="clicks">Clicks : 0</div>
    <img
      id="clicker-img"
      src="./img/click1.png"
      onclick="handleClick()"
      alt="Clicker"
    />
    <div class="buttons">
      <button onclick="window.location.href = 'clicker-shop.html'">
        🛒 Boutique
      </button>
      <button onclick="window.location.href = '../choix_jeu.html'">
        ⬅ Retour
      </button>
    </div>

    <script src="../../point.js"></script>
    <script src="../../js/clicker.js"></script>
  </body>
</html>
