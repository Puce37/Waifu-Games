<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Labyrinthe</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ===== Base ===== */
body {
  font-family: 'Orbitron', sans-serif;
  margin: 0;
  min-height: 100vh;
  overflow: hidden;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  background:
    radial-gradient(circle at top, rgba(140, 0, 255, 0.15), transparent 40%),
    radial-gradient(circle at bottom, rgba(0, 200, 255, 0.12), transparent 40%),
    linear-gradient(135deg, #050510, #090916 40%, #020205);

  color: #d8f6ff;
  position: relative;
}

/* ===== Grille futuriste ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;

  background-image:
    linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);

  background-size: 40px 40px;

  mask-image: radial-gradient(circle at center, black 30%, transparent 90%);
  pointer-events: none;

  animation: gridMove 12s linear infinite;
}

@keyframes gridMove {
  from {
    transform: translateY(0px);
  }
  to {
    transform: translateY(40px);
  }
}

/* ===== Glow ambiance ===== */
body::after {
  content: "";
  position: fixed;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(0,255,255,0.08), transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  filter: blur(50px);
  pointer-events: none;
}
      h1 {
        margin-top: 70px;
        font-size: 2.5rem;
        text-shadow:
          0 0 10px #00f0ff,
          0 0 20px #00d0ff;
      }
      canvas {
        margin-top: 20px;
        background: #111;
        border: 3px solid #00f0ff;
        box-shadow: 0 0 20px #00f0ff;
      }
      button {
        margin: 20px;
        padding: 12px 30px;
        font-size: 18px;
        font-weight: 700;
        color: #00f0ff;
        background: linear-gradient(145deg, #0a2a5f, #003080);
        border: 2px solid #00f0ff;
        border-radius: 12px;
        cursor: pointer;
        box-shadow:
          0 0 6px #00bfff,
          inset 0 0 8px #0077cc;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1.2px;
      }
      button:hover {
        background: linear-gradient(145deg, #005eff, #00ffff);
        box-shadow:
          0 0 12px #00ffff,
          0 0 30px #00ffff,
          inset 0 0 20px #00ffff;
        transform: translateY(-3px);
      }
      button:active {
        transform: translateY(1px);
      }
      #btn-return {
        position: fixed;
        top: 15px;
        left: 15px;
        padding: 8px 15px;
        font-size: 14px;
        border-radius: 8px;
        background: linear-gradient(145deg, #0a2a5f, #003080);
        border: 2px solid #00f0ff;
        box-shadow:
          0 0 6px #00bfff,
          inset 0 0 8px #0077cc;
        user-select: none;
        z-index: 1000;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
      }
      #btn-return:hover {
        color: #fff;
        background: linear-gradient(145deg, #005eff, #00ffff);
        box-shadow:
          0 0 12px #00ffff,
          0 0 30px #00ffff,
          inset 0 0 20px #00ffff;
        transform: translateY(-2px);
      }
      #btn-return:active {
        transform: translateY(1px);
        box-shadow:
          0 0 6px #00c6ff,
          inset 0 0 10px #00c6ff;
      }

      /* Animation victoire */
      #victory-message {
        font-weight: 800;
        font-size: 2.5rem;
        color: #00f0ff;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        text-shadow:
          0 0 5px #00f0ff,
          0 0 10px #00f0ff,
          0 0 20px #00e0ff,
          0 0 30px #00d0ff;
        animation: glow 2.5s ease-in-out infinite alternate;
        margin-top: 30px;
        display: none;
      }
      @keyframes glow {
        from {
          text-shadow:
            0 0 5px #00f0ff,
            0 0 10px #00f0ff,
            0 0 20px #00e0ff,
            0 0 30px #00d0ff;
        }
        to {
          text-shadow:
            0 0 15px #00ffff,
            0 0 25px #00ffff,
            0 0 35px #00c0ff,
            0 0 45px #00c0ff;
        }
      }
    </style>
  </head>
  <body>
    <button
      id="btn-return"
      onclick="window.location.href = '../choix_jeu.html'"
    >
      ⬅️ Retour
    </button>
    <h1>Labyrinthe</h1>
    <canvas id="maze" width="600" height="600"></canvas>
    <br />
    <div id="victory-message">
      🎉 Bien joué ! Tu as terminé le labyrinthe +10 points ! 🎉
    </div>
    <button onclick="generateMaze()">🔁 Rejouer</button>

    <script src="../../point.js"></script>
    <script src="../../js/maze.js"></script>
  </body>
</html>
