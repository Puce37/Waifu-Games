<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" type="image/png" href="../../Logo/logo.png" />
    <title>Rio - Puzzle Games</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ===== Base ===== */
body {
  font-family: 'Orbitron', sans-serif;
  margin: 0;
  min-height: 100vh;
  overflow: hidden;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  background:
    radial-gradient(circle at top, rgba(140, 0, 255, 0.15), transparent 40%),
    radial-gradient(circle at bottom, rgba(0, 200, 255, 0.12), transparent 40%),
    linear-gradient(135deg, #050510, #090916 40%, #020205);

  color: #d8f6ff;
  position: relative;
}

/* ===== Grille futuriste ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;

  background-image:
    linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);

  background-size: 40px 40px;

  mask-image: radial-gradient(circle at center, black 30%, transparent 90%);
  pointer-events: none;

  animation: gridMove 12s linear infinite;
}

@keyframes gridMove {
  from {
    transform: translateY(0px);
  }
  to {
    transform: translateY(40px);
  }
}

/* ===== Glow ambiance ===== */
body::after {
  content: "";
  position: fixed;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(0,255,255,0.08), transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  filter: blur(50px);
  pointer-events: none;
}

      h2 {
        font-size: 3rem;
        margin-bottom: 40px;
        color: #00f0ff;
        text-shadow:
          0 0 5px #00f0ff,
          0 0 10px #00f0ff;
      }

      .menu {
        display: flex;
        flex-direction: column;
        gap: 25px;
        width: 300px;
      }

      .menu a {
        padding: 15px 0;
        font-size: 1.5rem;
        font-weight: 700;
        color: #00f0ff;
        background: linear-gradient(145deg, #0a2a5f, #003080);
        border: 2px solid #00f0ff;
        border-radius: 12px;
        text-decoration: none;
        box-shadow:
          0 0 6px #00bfff,
          inset 0 0 8px #0077cc;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .menu a:hover {
        color: #ffffff;
        background: linear-gradient(145deg, #005eff, #00ffff);
        box-shadow:
          0 0 12px #00ffff,
          0 0 30px #00ffff,
          inset 0 0 20px #00ffff;
        transform: translateY(-3px);
      }

      .menu a:active {
        transform: translateY(1px);
        box-shadow:
          0 0 6px #00c6ff,
          inset 0 0 10px #00c6ff;
      }

      .back {
        margin-top: 40px;
        font-size: 1rem;
        color: #00ffff;
        cursor: pointer;
        text-decoration: underline;
      }

      .back:hover {
        color: white;
      }
    </style>
  </head>
  <body>
    <h2>Nombre de Pièces :</h2>
    <div class="menu">
      <a href="./puzzle9.html">9</a>
      <a href="./puzzle16.html">16</a>
      <a href="./puzzle25.html">25</a>
      <a href="./puzzle36.html">36</a>
      <a href="./puzzle49.html">49</a>
    </div>
    <div class="back" onclick="menu()">⬅ Retour</div>

    <script src="../../js/pieces.js"></script>
  </body>
</html>
