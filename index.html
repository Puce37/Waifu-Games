<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./css/point.css" />
    <link rel="stylesheet" href="./css/index.css" />
    <link rel="shortcut icon" type="image/png" href="./Logo/logo.png" />
    <title>Menu - Cyber Luna</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="fullscreen-warning">
      <div class="message">📺 Plein écran recommandé [Appuyer sur F11]</div>
    </div>

    <div class="points-display">💠 Points : <span id="points">0</span></div>

    <h1>Cyber Luna</h1>
    <div class="menu">
      <button onclick="startGame()">▶ Jouer</button>
      <button onclick="inv()">🎒 Inventaire</button>
      <button onclick="shop()">🛒 Magasin</button>
      <button onclick="openOptions()">⚙️ Options</button>
      <button onclick="showAbout()">ℹ️ À propos</button>
    </div>

    <script src="./js/point.js"></script>
    <script src="./js/index.js"></script>
    <a
      href="./discord.html"
      target="_blank"
      class="discord-btn"
      title="Rejoindre Discord"
    >
      <img src="./Logo/discord.png" alt="Discord" />
    </a>
  </body>
</html>
