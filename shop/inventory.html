<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Inventaire - Cyber Luna</title>
    <link rel="stylesheet" href="../css/point.css" />
    <link rel="stylesheet" href="./css/inventory.css" />
    <link rel="stylesheet" href="../css/scrollbar.css" />
    <link rel="shortcut icon" type="image/png" href="../Logo/logo.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <!-- Modal de vente par rareté -->
  <div id="sellModal" class="modal hidden">
    <div class="modal-content">
      <h2>Vente par rareté</h2>
      <form id="rarityForm">
        <label
          ><input type="checkbox" name="rarity" value="commun" /> Commun</label
        ><br />
        <label
          ><input type="checkbox" name="rarity" value="peucommun" /> Peu
          Commun</label
        ><br />
        <label><input type="checkbox" name="rarity" value="rare" /> Rare</label
        ><br />
        <label
          ><input type="checkbox" name="rarity" value="epique" /> Épique</label
        ><br />
        <label
          ><input type="checkbox" name="rarity" value="legendary" />
          Légendaire</label
        ><br />
        <label
          ><input type="checkbox" name="rarity" value="exotique" />
          Exotique</label
        ><br />
      </form>
      <div class="modal-buttons">
        <button class="sell-confirm" onclick="confirmSellSelected()">
          ✅ Vendre
        </button>
        <button class="sell-cancel" onclick="closeSellModal()">
          ❌ Annuler
        </button>
      </div>
    </div>
  </div>

  <body>
    <div class="points-display">
      💠 Points : <span id="points">0</span>
    </div>
    <h1>🎒 Inventaire</h1>
    <div id="bonusDisplay">Bonus actuel : x1</div>
    <div id="inventory" class="inventory-grid"></div>
    <button class="sell-all-btn" onclick="openSellModal()">
      🪙 Tout vendre (choix)
    </button>
    <button class="back-btn" onclick="window.location.href = '../index.html'">
      ⬅ Retour
    </button>

    <script src="../js/point.js"></script>
    <script src="./js/inventory.js"></script>
  </body>
</html>
