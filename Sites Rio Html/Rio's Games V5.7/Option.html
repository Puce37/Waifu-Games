<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="shortcut icon" type="image/png" href="./Logo/logo.png" />
  <title>Options - Rio Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle at center, #0a0a0a, #000000 80%);
      color: #00f0ff;
      margin: 0;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 40px 20px 20px;
      box-sizing: border-box;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        repeating-linear-gradient(
          45deg,
          rgba(0, 240, 255, 0.05),
          rgba(0, 240, 255, 0.05) 2px,
          transparent 2px,
          transparent 10px
        ),
        repeating-linear-gradient(
          -45deg,
          rgba(0, 240, 255, 0.05),
          rgba(0, 240, 255, 0.05) 2px,
          transparent 2px,
          transparent 10px
        );
      z-index: 0;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    /* Contenu au-dessus */
    body > * {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-weight: 900;
      font-size: 4rem;
      letter-spacing: 0.15em;
      color: #00f0ff;
      text-transform: uppercase;
      text-shadow:
        0 0 5px #00f0ff,
        0 0 10px #00f0ff,
        0 0 20px #00e0ff,
        0 0 30px #00d0ff,
        0 0 40px #00c0ff;
      margin-bottom: 60px;
    }

    label {
      font-size: 1.5rem;
      margin-bottom: 20px;
      display: block;
      cursor: pointer;
      user-select: none;
    }

    input[type="checkbox"] {
      transform: scale(1.5);
      margin-right: 10px;
      vertical-align: middle;
      cursor: pointer;
    }

    /* Boutons style commun */
    .btn {
      padding: 15px 30px;
      font-size: 1.2rem;
      font-weight: 700;
      color: #00f0ff;
      background: linear-gradient(145deg, #0a2a5f, #003080);
      border: 2px solid #00f0ff;
      border-radius: 12px;
      cursor: pointer;
      box-shadow:
        0 0 6px #00bfff,
        inset 0 0 8px #0077cc;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      user-select: none;
      outline: none;
      margin: 10px auto;
      display: inline-block;
      min-width: 200px;
    }

    .btn:hover {
      color: #ffffff;
      background: linear-gradient(145deg, #005eff, #00ffff);
      box-shadow:
        0 0 12px #00ffff,
        0 0 30px #00ffff,
        inset 0 0 20px #00ffff;
      transform: translateY(-3px);
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow:
        0 0 6px #00c6ff,
        inset 0 0 10px #00c6ff;
    }

    /* Boutons spécifiques */
    #reset-btn {
      background: darkred;
      border-color: red;
      box-shadow: 0 0 8px red;
      margin-top: 40px;
      min-width: 250px;
    }

    #reset-btn:hover {
      background: crimson;
      box-shadow: 0 0 15px red, 0 0 30px red;
    }

    #show-multiplier-btn {
      margin-top: 10px;
      background: #004400;
      border-color: #00ff00;
      box-shadow: 0 0 8px #00ff00;
      min-width: 250px;
    }

    #show-multiplier-btn:hover {
      background: #00aa00;
      box-shadow: 0 0 15px #00ff00, 0 0 30px #00ff00;
    }
  </style>
</head>
<body>
  <h1>Options</h1>

  <!-- Exemple de checkbox -->
  <!--
  <label>
    <input type="checkbox" id="music-toggle" />
    Activer la musique de fond
  </label>

  <button class="btn" onclick="testMusic()">🎧 Tester la musique</button>
  -->

  <button id="reset-btn" class="btn" onclick="resetPoints()">🔁 Réinitialiser tous les stats</button>

  <button id="btn-return" class="btn" onclick="goToMenu()">⬅ Retour</button>

  <audio id="bg-music" loop>
    <source src="./rio/music.mp3" type="audio/mpeg" />
    Votre navigateur ne supporte pas l’audio.
  </audio>

  <script src="./point.js"></script>
  <script>
    const musicToggle = document.getElementById('music-toggle');
    const bgMusic = document.getElementById('bg-music');

    if(musicToggle){
      const musicEnabled = localStorage.getItem('music') === 'on';
      musicToggle.checked = musicEnabled;
      if (musicEnabled) {
        bgMusic.volume = 0.3;
        bgMusic.play();
      }

      musicToggle.addEventListener('change', () => {
        if (musicToggle.checked) {
          localStorage.setItem('music', 'on');
          bgMusic.volume = 0.3;
          bgMusic.play();
        } else {
          localStorage.setItem('music', 'off');
          bgMusic.pause();
          bgMusic.currentTime = 0;
        }
      });
    }

    function testMusic() {
      bgMusic.currentTime = 0;
      bgMusic.play();
    }

    function goToMenu() {
      window.location.href = 'Menu.html';
    }

    function resetPoints() {
      const confirmReset = confirm("⚠️ ATTENTION : Cela va remettre vos points, bonus et inventaire à zéro. Voulez-vous continuer ?");
      if (confirmReset) {
        localStorage.setItem("points", "0");
        localStorage.setItem("multipliers", "[]");
        localStorage.setItem("inventory", "[]");
        localStorage.setItem("equipped", "[]");
        alert("✅ Tous les paramètres ont été réinitialisés !");
        window.location.reload();
      }
    }
  </script>
</body>
</html>
