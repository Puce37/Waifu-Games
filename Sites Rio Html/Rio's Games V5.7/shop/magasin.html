<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Magasin - Rio Games</title>
  <link rel="stylesheet" href="../point.css" />
  <link rel="shortcut icon" type="image/png" href="../Logo/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle at center, #0a0a0a, #000000 80%);
      color: #00f0ff;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-weight: 900;
      font-size: 4rem;
      letter-spacing: 0.15em;
      color: #00f0ff;
      text-transform: uppercase;
      text-shadow:
        0 0 5px #00f0ff,
        0 0 10px #00f0ff,
        0 0 20px #00e0ff,
        0 0 30px #00d0ff,
        0 0 40px #00c0ff;
      margin-bottom: 60px;
    }

    .points-display {
      font-size: 1.4em;
      margin-bottom: 30px;
    }

    .store-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .item {
      background: #111;
      border: 2px solid #00f0ff;
      padding: 10px;
      border-radius: 12px;
      width: 180px;
      text-align: center;
      box-shadow: 0 0 10px #00f0ff55;
    }

    .item img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }

    .item p {
      margin: 6px 0;
    }

    .item button {
      background: transparent;
      border: 2px solid #00f0ff;
      color: #00f0ff;
      font-weight: bold;
      padding: 5px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .item button:hover {
      background: #00f0ff;
      color: black;
    }
	
	button {
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      color: #00f0ff;
      background: linear-gradient(145deg, #0a2a5f, #003080);
      border: 2px solid #00f0ff;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 6px #00bfff, inset 0 0 8px #0077cc;
      margin: 10px;
      transition: all 0.2s ease-in-out;
    }

    button:hover {
      background: linear-gradient(145deg, #005eff, #00ffff);
      transform: scale(1.05);
	  box-shadow:
        0 0 5px #00f0ff,
        0 0 10px #00f0ff,
        0 0 20px #00e0ff,
        0 0 30px #00d0ff,
        0 0 40px #00c0ff;
    }
  </style>
</head>
<body>
  <h1>🛒 Magasin</h1>

	<br>
    <button onclick="gacha()">🎰 Paquets de cartes</button>

  <div class="points-display">💠 Points : <span id="points">0</span></div>
  <div class="store-grid" id="store"></div>
  <br>
  <button onclick="goBack()">🔙 Retour</button>

  <script src="../point.js"></script>
  <script>
    const storeItems = [
      <!-- { name: "A venir", image: "../Items/.png", price: 0 }, -->
    ];

    function updateStore() {
      const container = document.getElementById("store");
      container.innerHTML = "";

      storeItems.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <img src="${item.image}" alt="${item.name}">
          <p><strong>${item.name}</strong></p>
          <p>💠 Prix : ${item.price} pts</p>
          <button onclick='buyItem(${JSON.stringify(item)})'>Acheter</button>
        `;
        container.appendChild(div);
      });
    }

    function buyItem(item) {
      const points = parseInt(localStorage.getItem("points") || "0");

      if (points < item.price) {
        alert("Pas assez de points !");
        return;
      }

      const newPoints = points - item.price;
      localStorage.setItem("points", newPoints);
      updatePointsDisplay();

      const inventory = JSON.parse(localStorage.getItem("inventory") || "[]");
      inventory.push({
        name: item.name,
        image: item.image,
        bonus: 0,
        rarity: "special"
      });
      localStorage.setItem("inventory", JSON.stringify(inventory));
      alert(`${item.name} a été ajouté à ton inventaire !`);
    }

    window.addEventListener("load", () => {
      updatePointsDisplay();
      updateStore();
    });
	
	function goBack() {
      window.location.href = '../menu.html';
    }
	
	function gacha() {
      window.location.href = './gacha.html';
    }
  </script>
</body>
</html>
