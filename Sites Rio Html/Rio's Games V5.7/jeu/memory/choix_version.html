<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
   <link rel="shortcut icon" type="image/png" href="../../Logo/logo.png" />
  <title>Rio Memory Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    body {
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(circle at center, #0a0a0a, #000000 80%);
  color: #00f0ff;
  margin: 0;
  padding: 0 20px;
  text-align: center;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  box-sizing: border-box;
}


    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        repeating-linear-gradient(
          45deg,
          rgba(0, 240, 255, 0.05),
          rgba(0, 240, 255, 0.05) 2px,
          transparent 2px,
          transparent 10px
        ),
        repeating-linear-gradient(
          -45deg,
          rgba(0, 240, 255, 0.05),
          rgba(0, 240, 255, 0.05) 2px,
          transparent 2px,
          transparent 10px
        );
      z-index: 0;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    h2 {
      font-size: 3rem;
      margin-bottom: 40px;
      color: #00f0ff;
      text-shadow:
        0 0 5px #00f0ff,
        0 0 10px #00f0ff;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 25px;
      width: 300px;
    }

    .menu a {
      padding: 15px 0;
      font-size: 1.5rem;
      font-weight: 700;
      color: #00f0ff;
      background: linear-gradient(145deg, #0a2a5f, #003080);
      border: 2px solid #00f0ff;
      border-radius: 12px;
      text-decoration: none;
      box-shadow:
        0 0 6px #00bfff,
        inset 0 0 8px #0077cc;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .menu a:hover {
      color: #ffffff;
      background: linear-gradient(145deg, #005eff, #00ffff);
      box-shadow:
        0 0 12px #00ffff,
        0 0 30px #00ffff,
        inset 0 0 20px #00ffff;
      transform: translateY(-3px);
    }

    .menu a:active {
      transform: translateY(1px);
      box-shadow:
        0 0 6px #00c6ff,
        inset 0 0 10px #00c6ff;
    }

    .back {
      margin-top: 40px;
      font-size: 1rem;
      color: #00ffff;
      cursor: pointer;
      text-decoration: underline;
    }

    .back:hover {
      color: white;
    }
  </style>
</head>
<body>
  <h2>Choisis une difficulté</h2>
  <div class="menu">
    <a href="memory16.html">🟢 Facile</a>
    <a href="memory32.html">🟡 Moyen</a>
    <a href="memory64.html">🔴 Difficile</a>
  </div>
  <div class="back" onclick="menu()">⬅ Retour</div>
  
  <script>
    function menu() {
      window.location.href = '../choix_jeu.html';
    }
	
  </script>
</body>
</html>
