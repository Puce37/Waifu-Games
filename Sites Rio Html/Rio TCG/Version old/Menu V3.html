<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mini TCG - Complet & Clean</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#001020;
    color:#cce8ff;
    overflow:hidden;
}

/* === DECK EN BAS À DROITE === */
#deck {
    position:absolute;
    bottom:30px;
    right:30px;
    width:120px;
    height:160px;
    cursor:pointer;
}
#deck img {
    width:100%;
    height:100%;
    border-radius:10px;
    border:2px solid #2db4ff;
    transition:0.3s;
}
#deck img:hover { transform:scale(1.05) rotateY(10deg); }

/* === TERRAIN === */
#field {
    position:absolute;
    top:160px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
}
.slot {
    width:140px;
    height:200px;
    border-radius:12px;
    border:2px solid #34baff;
    background:rgba(0,60,120,0.3);
    display:flex;
    justify-content:center;
    align-items:center;
}
#active-slot { border-color:#4bd3ff; }

/* === MAIN CENTRÉE EN BAS === */
#hand {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;          /* largeur suffisante pour l’arc */
    height: 240px;         /* hauteur ≥ carte + arc */
    pointer-events: auto;  /* cartes cliquables */
    overflow: visible;     /* pour que les cartes dépassant restent visibles */
}


/* === CARTES === */
.card {
    width:120px;
    height:180px;
    border-radius:10px;
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    transition:0.35s;
    position:absolute;
    cursor:grab;
    pointer-events:auto;
}
.card.in-hand {
    transform-origin:bottom center;
}
.card:hover {
    transform:translateY(-25px) scale(1.1) !important;
    z-index:9999;
}

/* Texte */
.card-title {
    text-align:center;
    padding-top:5px;
    color:#bde8ff;
    font-weight:bold;
}
.card-stats {
    display:flex;
    justify-content:space-around;
    padding:5px;
    border-bottom-left-radius:10px;
    border-bottom-right-radius:10px;
    background-size:cover;
}

/* Stats */
.stat { width:28px; height:28px; position:relative; }
.stat img { width:100%; height:100%; }
.stat span {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-weight:bold;
    text-shadow:0 0 3px black;
}
</style>
</head>

<body>

<!-- Deck -->
<div id="deck"><img src="card-back.png"></div>

<!-- Terrain -->
<div id="field">
    <div class="slot" id="active-slot"></div>
    <div class="slot"></div>
    <div class="slot"></div>
    <div class="slot"></div>
    <div class="slot"></div>
    <div class="slot"></div>
</div>

<!-- Main -->
<div id="hand"></div>

<script>
// ==============================
//           DECK
// ==============================
let deck = [];
for (let i=0; i<20; i++) {
    deck.push({
        type: i%2===0 ? "UNIT" : "SKILL",
        name:"Carte "+(i+1),
        atk: Math.floor(Math.random()*6),
        energy: Math.floor(Math.random()*4),
        special: Math.floor(Math.random()*5),
        front:"card1-front.png",
        statsBg:"stats-bg1.png"
    });
}

let handDiv = document.getElementById("hand");
let slots = document.querySelectorAll(".slot");

let iconHeart="heart.png", iconEnergy="energy.png", iconSpecial="special.png";


// ==============================
// LAYOUT DE LA MAIN EN ARC
// ==============================
function updateHandLayout() {
    const cards = [...handDiv.children];
    const total = cards.length;
    if(total === 0) return;

    const arc = 50;     // rotation totale
    const spread = 180; // écart horizontal
    const maxRise = 60; // hauteur max de l’arc
    const cardWidth = 120;

    cards.forEach((card, i) => {
        const ratio = (i - (total-1)/2)/((total-1)||1);
        const angle = ratio * arc;
        const x = ratio * spread;
        const y = Math.abs(ratio) * maxRise;

        card.style.position = "absolute";
        card.style.bottom = `${y}px`;
        card.style.left = `calc(50% + ${x}px - ${cardWidth/2}px)`;
        card.style.transform = `rotate(${angle}deg)`;
        card.style.zIndex = 100 + i;
    });
}





// ==============================
// ANIMATION DE PIOCHE
// ==============================
document.getElementById("deck").onclick = () => {

    if (handDiv.children.length >= 10) {
        alert("Main pleine (10 cartes max)");
        return;
    }
    if (deck.length === 0) return;

    let data = deck.pop();

    // Carte
    let card = document.createElement("div");
    card.className="card";
    card.style.backgroundImage=`url(${data.front})`;
    card.dataset.type=data.type;

    // Position initiale = deck
let d = document.getElementById("deck").getBoundingClientRect();
card.style.position = "fixed";
card.style.left = d.left + "px";
card.style.top = d.top + "px";
card.style.pointerEvents = "none";
document.body.appendChild(card);

let targetX = window.innerWidth/2 - 60;
let targetY = window.innerHeight - 240; // juste au-dessus de la main

// Transition fluide
card.style.transition = "all 0.4s ease";

setTimeout(()=>{
    card.style.left = targetX+"px";
    card.style.top = targetY+"px";
},10);

setTimeout(()=>{
    // Place la carte dans la main et laisse updateHandLayout() gérer l'arc
    card.style.transition = "none";
    card.style.position = "absolute";
    card.style.left = "0px";
    card.style.top = "0px";
    card.style.pointerEvents = "auto";
    handDiv.appendChild(card);
    updateHandLayout();
}, 450);






    // Titre
    let title=document.createElement("div");
    title.className="card-title";
    title.textContent=data.name;
    card.appendChild(title);

    // Stats
    let stats=document.createElement("div");
    stats.className="card-stats";
    stats.style.backgroundImage=`url(${data.statsBg})`;

    function stat(ico,val){
        let s=document.createElement("div");
        s.className="stat";
        s.innerHTML=`<img src="${ico}"><span>${val}</span>`;
        return s;
    }
    stats.appendChild(stat(iconHeart,data.atk));
    stats.appendChild(stat(iconEnergy,data.energy));
    stats.appendChild(stat(iconSpecial,data.special));

    card.appendChild(stats);

    enableDrag(card);
};


// ==============================
// DRAG & DROP
// ==============================
function enableDrag(card){
    let dragging=false, offsetX, offsetY;

    card.onmousedown=e=>{
        dragging=true;
        card.classList.remove("in-hand");
        offsetX=e.clientX-card.offsetLeft;
        offsetY=e.clientY-card.offsetTop;
        card.style.zIndex=2000;
    };

    document.onmousemove=e=>{
        if(!dragging) return;
        card.style.left=e.clientX-offsetX+"px";
        card.style.top=e.clientY-offsetY+"px";
        card.style.transform="rotate(0deg)";
    };

    document.onmouseup=e=>{
        if(!dragging) return;
        dragging=false;

        let placed=false;

        slots.forEach(slot=>{
            let r=slot.getBoundingClientRect();
            if(e.clientX>r.left && e.clientX<r.right && e.clientY>r.top && e.clientY<r.bottom){
                
                if(card.dataset.type==="SKILL"){
                    alert(card.querySelector(".card-title").textContent+" utilisé !");
                    card.remove();
                } else {
                    card.style.position="relative";
                    card.style.left="0px";
                    card.style.top="0px";
                    slot.appendChild(card);
                }
                placed=true;
            }
        });

        if(!placed){
            handDiv.appendChild(card);
            updateHandLayout();
        }
    };
}
</script>

</body>
</html>
