<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mini TCG - Images & Animation</title>
<style>
body { margin:0; font-family:Arial; background:#001020; color:#cce8ff; }
#deck { position:absolute; top:20px; left:20px; width:120px; height:160px; cursor:pointer; perspective:600px; }
#deck img { width:100%; height:100%; border:2px solid #2db4ff; border-radius:10px; transition: transform 0.5s; }
#deck img:hover { transform: rotateY(20deg) translateY(-5px); }

#field { position:absolute; top:200px; left:50%; transform:translateX(-50%); display:flex; gap:10px; }
.slot { width:140px; height:200px; border:2px solid #2fb8ff; border-radius:12px; background:rgba(0,60,120,0.3); display:flex; justify-content:center; align-items:center; }
#active-slot { border-color:#4bd3ff; }

#hand { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:10px; }

.card { width:120px; height:180px; border-radius:10px; cursor:grab; position:relative; display:flex; flex-direction:column; justify-content:space-between; background-size:cover; background-position:center; transition: transform 0.3s; }

.card-title { text-align:center; padding-top:5px; font-weight:bold; color:#bde8ff; text-shadow:0 0 3px black; }

.card-stats { display:flex; justify-content:space-around; padding:5px; border-bottom-left-radius:10px; border-bottom-right-radius:10px; background-size:cover; background-position:center; }

.stat { width:28px; height:28px; position:relative; }
.stat img { width:100%; height:100%; display:block; }
.stat span { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:white; font-weight:bold; font-size:14px; pointer-events:none; text-shadow:0 0 2px black; }
</style>
</head>
<body>

<div id="deck"><img src="card-back.png" alt="Deck"></div>

<div id="field">
  <div class="slot" id="active-slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
</div>

<div id="hand"></div>

<script>
// ===== Deck et main
let deck = [
  {type:"UNIT", name:"Space Rio", atk:4, energy:2, special:1, front:"card1-front.png", statsBg:"stats-bg1.png"},
  {type:"UNIT", name:"Drone Amas", atk:2, energy:1, special:3, front:"card2-front.png", statsBg:"stats-bg2.png"},
  {type:"SKILL", name:"Amas", atk:5, energy:3, special:0, front:"card3-front.png", statsBg:"stats-bg3.png"},
  {type:"SKILL", name:"Bouclier", atk:0, energy:2, special:5, front:"card4-front.png", statsBg:"stats-bg4.png"}
];

let handDiv = document.getElementById("hand");
let fieldSlots = document.querySelectorAll(".slot");

// PNG icons
let iconHeart = "heart.png";   
let iconEnergy = "energy.png"; 
let iconSpecial = "special.png"; 

// ===== Tirer une carte avec animation
document.getElementById("deck").onclick = () => {
    if(deck.length===0) return;
    let data = deck.pop();

    // Créer la carte
    let card = document.createElement("div");
    card.className="card";
    card.dataset.type=data.type;
    card.style.backgroundImage = `url(${data.front})`;

    // Animation initiale (pioche)
    card.style.transform="translateY(-200px) scale(0.5)";
    handDiv.appendChild(card);

    setTimeout(()=>{ card.style.transform="translateY(0px) scale(1)"; },50);

    // Titre
    let title = document.createElement("div");
    title.className="card-title";
    title.textContent = data.name;
    card.appendChild(title);

    // Stats avec image en fond
    let stats = document.createElement("div");
    stats.className="card-stats";
    stats.style.backgroundImage=`url(${data.statsBg})`;

    function createStat(icon,value){
        let s = document.createElement("div"); s.className="stat";
        let img = document.createElement("img"); img.src=icon;
        let span = document.createElement("span"); span.textContent=value;
        s.appendChild(img); s.appendChild(span);
        return s;
    }

    stats.appendChild(createStat(iconHeart,data.atk));
    stats.appendChild(createStat(iconEnergy,data.energy));
    stats.appendChild(createStat(iconSpecial,data.special));

    card.appendChild(stats);

    enableDrag(card);
}

// ===== Drag & Drop
function enableDrag(card){
    let offsetX, offsetY, dragging=false;
    card.onmousedown=(e)=>{
        dragging=true;
        offsetX=e.clientX-card.offsetLeft;
        offsetY=e.clientY-card.offsetTop;
        card.style.position="absolute";
        card.style.zIndex=1000;
    };

    document.onmousemove=(e)=>{
        if(!dragging) return;
        card.style.left=e.clientX-offsetX+"px";
        card.style.top=e.clientY-offsetY+"px";
    };

    document.onmouseup=(e)=>{
        if(!dragging) return;
        dragging=false;
        let placed=false;

        fieldSlots.forEach(slot=>{
            let r=slot.getBoundingClientRect();
            if(e.clientX>r.left && e.clientX<r.right && e.clientY>r.top && e.clientY<r.bottom){
                if(card.dataset.type === "SKILL"){
                    alert(card.querySelector(".card-title").textContent + " utilisé !");
                    card.remove();
                } else {
                    card.style.position="relative";
                    card.style.left="0px";
                    card.style.top="0px";
                    slot.appendChild(card);
                }
                placed=true;
            }
        });

        if(!placed){
            card.style.position="relative";
            card.style.left="0px";
            card.style.top="0px";
            handDiv.appendChild(card);
        }
    };
}
</script>

</body>
</html>
