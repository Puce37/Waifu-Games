<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mini TCG - Icônes PNG</title>
<style>
body { margin:0; font-family:Arial; background:#001020; color:#cce8ff; }
#deck { position:absolute; top:20px; left:20px; width:120px; height:160px; background:rgba(0,80,150,0.5); border:2px solid #2db4ff; display:flex; justify-content:center; align-items:center; cursor:pointer; }
#field { position:absolute; top:200px; left:50%; transform:translateX(-50%); display:flex; gap:10px; }
.slot { width:140px; height:200px; border:2px solid #2fb8ff; border-radius:12px; background:rgba(0,60,120,0.3); display:flex; justify-content:center; align-items:center; }
#active-slot { border-color:#4bd3ff; }
#hand { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:10px; }
.card { width:120px; height:180px; background:#003366; border:2px solid #2db4ff; border-radius:10px; cursor:grab; position:relative; display:flex; flex-direction:column; justify-content:space-between; }
.card-title { text-align:center; padding-top:5px; font-weight:bold; color:#bde8ff; }
.card-stats { display:flex; justify-content:space-around; background:rgba(0,0,50,0.5); padding:5px; border-bottom-left-radius:10px; border-bottom-right-radius:10px; }
.stat { width:28px; height:28px; position:relative; }
.stat img { width:100%; height:100%; display:block; }
.stat span { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:white; font-weight:bold; font-size:14px; pointer-events:none; }
</style>
</head>
<body>

<div id="deck">Deck</div>

<div id="field">
  <div class="slot" id="active-slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
</div>

<div id="hand"></div>

<script>
// ===== Deck
let deck = [
  {type:"UNIT", name:"Drone", atk:4, energy:2, special:1},
  {type:"UNIT", name:"Sentinelle", atk:2, energy:1, special:3},
  {type:"SKILL", name:"Surcharge", atk:5, energy:3, special:0},
  {type:"SKILL", name:"Bouclier", atk:0, energy:2, special:5}
];

let handDiv = document.getElementById("hand");
let fieldSlots = document.querySelectorAll(".slot");

// ===== PNG ICONS
let iconHeart = "heart.png";   // Remplace par ton PNG
let iconEnergy = "energy.png"; // Remplace par ton PNG
let iconSpecial = "special.png"; // Remplace par ton PNG

// ===== Tirer une carte
document.getElementById("deck").onclick = () => {
    if(deck.length === 0) return;
    let data = deck.pop();

    let card = document.createElement("div");
    card.className="card";
    card.dataset.type = data.type;

    // Titre
    let title = document.createElement("div");
    title.className="card-title";
    title.textContent = data.name;
    card.appendChild(title);

    // Barre des stats
    let stats = document.createElement("div");
    stats.className="card-stats";

    function createStat(icon, value){
        let s = document.createElement("div");
        s.className="stat";
        let img = document.createElement("img"); img.src=icon;
        let span = document.createElement("span"); span.textContent=value;
        s.appendChild(img);
        s.appendChild(span);
        return s;
    }

    stats.appendChild(createStat(iconHeart,data.atk));
    stats.appendChild(createStat(iconEnergy,data.energy));
    stats.appendChild(createStat(iconSpecial,data.special));

    card.appendChild(stats);

    handDiv.appendChild(card);
    enableDrag(card);
}

// ===== Drag & Drop
function enableDrag(card){
    let offsetX, offsetY, dragging=false;

    card.onmousedown=(e)=>{
        dragging=true;
        offsetX=e.clientX-card.offsetLeft;
        offsetY=e.clientY-card.offsetTop;
        card.style.position="absolute";
        card.style.zIndex=1000;
    };

    document.onmousemove=(e)=>{
        if(!dragging) return;
        card.style.left=e.clientX-offsetX+"px";
        card.style.top=e.clientY-offsetY+"px";
    };

    document.onmouseup=(e)=>{
        if(!dragging) return;
        dragging=false;
        let placed=false;

        fieldSlots.forEach(slot=>{
            let r=slot.getBoundingClientRect();
            if(e.clientX>r.left && e.clientX<r.right && e.clientY>r.top && e.clientY<r.bottom){
                if(card.dataset.type === "SKILL"){
                    alert(card.querySelector(".card-title").textContent + " utilisé !");
                    card.remove();
                } else {
                    card.style.position="relative";
                    card.style.left="0px";
                    card.style.top="0px";
                    slot.appendChild(card);
                }
                placed=true;
            }
        });

        if(!placed){
            card.style.position="relative";
            card.style.left="0px";
            card.style.top="0px";
            handDiv.appendChild(card);
        }
    };
}
</script>

</body>
</html>
